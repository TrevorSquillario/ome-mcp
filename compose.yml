
services:
  ome_mcp:
    image: ome_mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OME_APP_ENV: "${OME_APP_ENV:-dev}"
    container_name: ome_mcp
    restart: unless-stopped
    ports:
      - "${OME_MCP_PORT:-8000}:8000"
    environment:
      # ── OME Connection ───────────────────────────────────────────────────
      OME_IP: "${OME_IP:-192.168.1.145}"
      OME_PORT: "${OME_PORT:-443}"
      # ── Authentication – supply via .env or Docker secret (never hardcode)
      OME_USER: "${OME_USER}"
      OME_PASSWORD: "${OME_PASSWORD}"
      # ── TLS Toggle (set to "true" in production) ─────────────────────────
      OME_VERIFY_SSL: "${OME_VERIFY_SSL:-false}"
      # runtime environment mode (dev|prod)
      OME_APP_ENV: "${OME_APP_ENV:-dev}"
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
