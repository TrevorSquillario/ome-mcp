
services:
  ome_mcp_v5:
    image: ome_mcp_v5:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ome_mcp_v5
    restart: unless-stopped

    ports:
      - "${MCP_PORT:-8000}:8000"

    environment:
      # ── OME Connection ───────────────────────────────────────────────────
      OME_IP:         "${OME_IP:-192.168.1.145}"
      OME_PORT:       "${OME_PORT:-443}"

      # ── Authentication – supply via .env or Docker secret (never hardcode)
      OME_USER:       "${OME_USER}"
      OME_PASSWORD:   "${OME_PASSWORD}"

      # ── TLS Toggle (set to "true" in production) ─────────────────────────
      OME_VERIFY_SSL: "${OME_VERIFY_SSL:-false}"

      # ── MCP Listen ───────────────────────────────────────────────────────
      MCP_HOST:       "0.0.0.0"
      MCP_PORT:       "8000"

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
